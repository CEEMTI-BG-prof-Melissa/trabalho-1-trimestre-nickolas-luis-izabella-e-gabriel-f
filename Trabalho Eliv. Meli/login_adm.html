<!-- login_adm.html -->
<!DOCTYPE html>

<html lang="PT-BR">
    <head>
        <meta charset="UTF-8">
        <title> Login de adimistrador </title>
    </head>
    <body>
        <h1> Login de adimistrador </h1>
        <hr>
        <form action="tabela.html" method="get">
           
            <label for="login"> Login: </label>
            <input type="text" id="login" name="Login" placeholder="Insira seu nome"><br><br>

            <label for="email"> E-mail: </label>
            <input type="email" id="email" name="E-mail" placeholder="Insira seu E-mail"><br><br>
           
            <label for="senha"> Senha: </label>
            <input type="password" id="senha" name="Senha" placeholder="Senha de 6 ou mais dígitos"><br><br>
           
            <input type="submit" name="Enviar" >
        </form>
    </body>
</html>
