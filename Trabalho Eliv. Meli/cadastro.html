<!DOCTYPE HTML>
<html lang="pt-br">
    <head>
        <meta charset="utf-8">
        <title>Página de cadastro</title>
    </head>
    <body>
        <h1> Cadastro de usuário </h1>
        <hr>
        
        <form action="login.html" method="get">
            <label for="nome"> Nome: </label>
            <input type="text" id="nome" name="Nome" placeholder="Insira seu nome completo">
            
            <label for="email"> E-mail: </label> 
            <input type="email" id="email" name="E-mail" placeholder="Insira seu E-mail"> <br><br>

            <label for="idade"> Idade: </label> 
            <input type="number" id="idade" name="Idade" placeholder="Insira sua idade">

            <label for="data"> Dt. Nasc: </label> 
            <input type="date" id="data" name="Data" placeholder="Insira seu nome E-mail"> <br><br>
            
            <label for="senha"> Senha: </label> 
            <input type="password" id="senha" name="Senha" placeholder="Insira uma senha">
            
            <label for="senhaconf"> Conf. Senha: </label> 
            <input type="password" id="senhaconf" name="Senha_conf" placeholder="Confirme sua senha"> <br><br>
            
            <input type="submit" name="Enviar" >
        </form>
    </body>
</html>
